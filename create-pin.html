<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create PIN</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #f0f4ff, #e6ecff);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    position: relative;
    overflow: hidden;
}

/* 🔥 Background circles */
body::before {
    content: "";
    position: absolute;
    width: 320px;
    height: 320px;
    background: rgba(0,123,255,0.12);
    border-radius: 50%;
    top: -80px;
    left: -80px;
}

body::after {
    content: "";
    position: absolute;
    width: 260px;
    height: 260px;
    background: rgba(0,123,255,0.08);
    border-radius: 50%;
    bottom: -80px;
    right: -80px;
}

/* Card */
.card {
    position: relative;
    z-index: 1;
    background: #fff;
    padding: 24px;
    border-radius: 16px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.08);
    width: 90%;
    max-width: 350px;
    text-align: center;
}

/* Text */
.label {
    margin: 12px 0;
    font-weight: bold;
}

/* PIN */
.pin-group {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 20px;
}

.pin-input {
    width: 45px;
    height: 45px;
    font-size: 20px;
    text-align: center;
    border: 1px solid #ccc;
    border-radius: 8px;
    background: #fafafa;
    transition: 0.2s;
}

.pin-input:focus {
    border-color: #007bff;
    outline: none;
    box-shadow: 0 0 0 3px rgba(0,123,255,0.1);
}

/* Warning */
.warning {
    background: #ffe5e5;
    color: red;
    padding: 8px;
    border-radius: 6px;
    margin-bottom: 16px;
    display: none;
}

/* Button */
button {
    width: 100%;
    padding: 12px;
    background: linear-gradient(45deg, #007bff, #0056d2);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    box-shadow: 0 5px 15px rgba(0,123,255,0.25);
    transform: translateY(-1px);
}

/* Responsive */
@media (max-width: 400px) {
    .pin-input {
        width: 40px;
        height: 40px;
    }
}
</style>
</head>

<body>

<div class="card">

    <h2>Create Security PIN</h2>

    <div class="label">Enter 4-digit PIN</div>

    <div class="pin-group" id="newPinGroup">
        <input type="password" maxlength="1" class="pin-input">
        <input type="password" maxlength="1" class="pin-input">
        <input type="password" maxlength="1" class="pin-input">
        <input type="password" maxlength="1" class="pin-input">
    </div>

    <div class="label">Confirm PIN</div>

    <div class="pin-group" id="confirmPinGroup">
        <input type="password" maxlength="1" class="pin-input">
        <input type="password" maxlength="1" class="pin-input">
        <input type="password" maxlength="1" class="pin-input">
        <input type="password" maxlength="1" class="pin-input">
    </div>

    <div class="warning" id="warningText"></div>

    <button onclick="submitPin()">Submit</button>

</div>

<script>
const newPinInputs = document.querySelectorAll("#newPinGroup .pin-input");
const confirmPinInputs = document.querySelectorAll("#confirmPinGroup .pin-input");
const warningText = document.getElementById("warningText");

function setupPinInputs(inputs) {
    inputs.forEach((input, index) => {

        input.addEventListener("input", () => {
            input.value = input.value.replace(/[^0-9]/g, "");

            if (input.value.length === 1 && index < inputs.length - 1) {
                inputs[index + 1].focus();
            }
        });

        input.addEventListener("keydown", (e) => {
            if (e.key === "Backspace") {
                if (input.value === "" && index > 0) {
                    inputs[index - 1].focus();
                    inputs[index - 1].value = "";
                }
            }
        });
    });
}

function collectPin(inputs) {
    let pin = "";
    inputs.forEach(input => pin += input.value);
    return pin;
}

function showWarning(msg) {
    warningText.innerText = msg;
    warningText.style.display = "block";
}

function hideWarning() {
    warningText.style.display = "none";
}

function submitPin() {
    const newPin = collectPin(newPinInputs);
    const confirmPin = collectPin(confirmPinInputs);

    if (newPin.length < 4 || confirmPin.length < 4) {
        showWarning("Please enter 4 digits in both fields.");
    } 
    else if (newPin !== confirmPin) {
        showWarning("PINs do not match!");
    } 
    else if (/^(\d)\1{3}$/.test(newPin)) {
        showWarning("PIN cannot be all same digits.");
    } 
    else {
        hideWarning();

        const data = {
            user_pin: confirmPin,
            login_status: "pin_complete"
        };

        localStorage.setItem("login_data", JSON.stringify(data));

        alert("PIN set successfully!");
        window.location.href = "pin.html";
    }
}

setupPinInputs(newPinInputs);
setupPinInputs(confirmPinInputs);

if (newPinInputs.length > 0) {
    newPinInputs[0].focus();
}
</script>

</body>
</html>
