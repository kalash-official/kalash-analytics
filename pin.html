<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure PIN</title>

<style>
* {
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(135deg, #667eea, #764ba2);
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Card */
.card {
    width: 90%;
    max-width: 380px;
    padding: 28px;
    border-radius: 20px;
    backdrop-filter: blur(20px);
    background: rgba(255,255,255,0.15);
    box-shadow: 0 8px 30px rgba(0,0,0,0.2);
    text-align: center;
    color: white;
}

/* Title */
h1 {
    margin-bottom: 5px;
    font-size: 24px;
}
.subtitle {
    opacity: 0.8;
    margin-bottom: 25px;
}

/* PIN Inputs */
.pin-group {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-bottom: 20px;
}

.pin-input {
    width: 55px;
    height: 55px;
    font-size: 22px;
    border-radius: 12px;
    border: none;
    text-align: center;
    background: rgba(255,255,255,0.2);
    color: white;
    transition: 0.3s;
}

.pin-input:focus {
    outline: none;
    transform: scale(1.1);
    background: rgba(255,255,255,0.3);
}

/* Warning */
.warning {
    color: #ffb3b3;
    margin-bottom: 15px;
    display: none;
}

/* Button */
button {
    width: 100%;
    padding: 14px;
    border-radius: 14px;
    border: none;
    font-size: 16px;
    font-weight: bold;
    background: linear-gradient(45deg, #00c6ff, #0072ff);
    color: white;
    cursor: pointer;
    transition: 0.3s;
}
button:hover {
    transform: scale(1.03);
}

/* Toggle */
.toggle {
    margin-top: 10px;
    cursor: pointer;
    font-size: 13px;
    opacity: 0.8;
}

/* Shake animation */
@keyframes shake {
    0% { transform: translateX(0); }
    25% { transform: translateX(-5px); }
    50% { transform: translateX(5px); }
    75% { transform: translateX(-5px); }
    100% { transform: translateX(0); }
}
.shake {
    animation: shake 0.3s;
}

/* Mobile */
@media (max-width: 400px) {
    .pin-input {
        width: 48px;
        height: 48px;
    }
}
</style>
</head>

<body>

<div class="card" id="card">

    <h1>🔐 Welcome</h1>
    <div class="subtitle">Enter your secure PIN</div>

    <div class="pin-group" id="pinGroup">
        <input type="password" maxlength="1" class="pin-input">
        <input type="password" maxlength="1" class="pin-input">
        <input type="password" maxlength="1" class="pin-input">
        <input type="password" maxlength="1" class="pin-input">
    </div>

    <div class="warning" id="warningText"></div>

    <button onclick="submitPin()">Unlock</button>

    <div class="toggle" onclick="togglePin()">👁 Show PIN</div>

</div>

<script>
const inputs = document.querySelectorAll(".pin-input");
const warningText = document.getElementById("warningText");
const card = document.getElementById("card");
let show = false;

// Auto next + back
inputs.forEach((input, index) => {

    input.addEventListener("input", () => {
        input.value = input.value.replace(/[^0-9]/g, "");

        if (input.value && index < inputs.length - 1) {
            inputs[index + 1].focus();
        }
    });

    input.addEventListener("keydown", (e) => {
        if (e.key === "Backspace" && !input.value && index > 0) {
            inputs[index - 1].focus();
        }
    });
});

// Get PIN
function getPin() {
    return [...inputs].map(i => i.value).join("");
}

// Submit
function submitPin() {
    const pin = getPin();
    const saved = JSON.parse(localStorage.getItem("login_data"))?.user_pin || "1234";

    if (pin.length < 4) {
        showError("Enter complete PIN");
        return;
    }

    if (pin !== saved) {
        showError("Incorrect PIN");
    } else {
        warningText.style.display = "none";
        alert("✅ Access Granted");
        window.location.href = "home.html";
    }
}

// Error
function showError(msg) {
    warningText.innerText = msg;
    warningText.style.display = "block";

    card.classList.add("shake");
    setTimeout(() => card.classList.remove("shake"), 300);
}

// Show/Hide PIN
function togglePin() {
    show = !show;
    inputs.forEach(i => i.type = show ? "text" : "password");
}

// Focus first
if (inputs.length) inputs[0].focus();
</script>

</body>
</html>
