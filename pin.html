<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure PIN</title>

<style>
* {
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

/* 🔥 PREMIUM BACKGROUND */
body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(135deg, #f0f4ff, #e6ecff);
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    overflow: hidden;
}

/* Circles */
body::before {
    content: "";
    position: absolute;
    width: 320px;
    height: 320px;
    background: rgba(0,123,255,0.12);
    border-radius: 50%;
    top: -80px;
    left: -80px;
}

body::after {
    content: "";
    position: absolute;
    width: 260px;
    height: 260px;
    background: rgba(0,123,255,0.08);
    border-radius: 50%;
    bottom: -80px;
    right: -80px;
}

/* 💎 Card */
.card {
    position: relative;
    z-index: 1;
    width: 90%;
    max-width: 380px;
    padding: 28px;
    border-radius: 20px;
    background: #ffffff;
    box-shadow: 0 12px 35px rgba(0,0,0,0.08);
    text-align: center;
}

/* Title */
h1 {
    margin-bottom: 5px;
    font-size: 24px;
    color: #222;
}
.subtitle {
    color: #777;
    margin-bottom: 25px;
}

/* PIN */
.pin-group {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-bottom: 20px;
}

.pin-input {
    width: 55px;
    height: 55px;
    font-size: 22px;
    border-radius: 12px;
    border: 1px solid #ddd;
    text-align: center;
    background: #fafafa;
    transition: 0.25s;
}

.pin-input:focus {
    outline: none;
    border-color: #007bff;
    box-shadow: 0 0 0 3px rgba(0,123,255,0.1);
    transform: scale(1.05);
}

/* Warning */
.warning {
    color: #d93025;
    margin-bottom: 15px;
    display: none;
    font-size: 14px;
}

/* Button */
button {
    width: 100%;
    padding: 14px;
    border-radius: 14px;
    border: none;
    font-size: 16px;
    font-weight: 600;
    background: linear-gradient(45deg, #007bff, #0056d2);
    color: white;
    cursor: pointer;
    transition: 0.25s;
}
button:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 16px rgba(0,123,255,0.25);
}

/* Toggle */
.toggle {
    margin-top: 10px;
    cursor: pointer;
    font-size: 13px;
    color: #555;
}

/* Shake animation */
@keyframes shake {
    0% { transform: translateX(0); }
    25% { transform: translateX(-4px); }
    50% { transform: translateX(4px); }
    75% { transform: translateX(-4px); }
    100% { transform: translateX(0); }
}
.shake {
    animation: shake 0.25s;
}

/* Responsive */
@media (max-width: 400px) {
    .pin-input {
        width: 48px;
        height: 48px;
    }
}
</style>
</head>

<body>

<div class="card" id="card">

    <h1>Welcome</h1>
    <div class="subtitle">Enter your secure PIN</div>

    <div class="pin-group">
        <input type="password" maxlength="1" class="pin-input">
        <input type="password" maxlength="1" class="pin-input">
        <input type="password" maxlength="1" class="pin-input">
        <input type="password" maxlength="1" class="pin-input">
    </div>

    <div class="warning" id="warningText"></div>

    <button onclick="submitPin()">Continue</button>

    <div class="toggle" onclick="togglePin()">👁 Show PIN</div>

</div>

<script>
const inputs = document.querySelectorAll(".pin-input");
const warningText = document.getElementById("warningText");
const card = document.getElementById("card");
let show = false;

// Auto next + backspace
inputs.forEach((input, index) => {

    input.addEventListener("input", () => {
        input.value = input.value.replace(/[^0-9]/g, "");

        if (input.value && index < inputs.length - 1) {
            inputs[index + 1].focus();
        }
    });

    input.addEventListener("keydown", (e) => {
        if (e.key === "Backspace" && !input.value && index > 0) {
            inputs[index - 1].focus();
        }
    });
});

// Get PIN
function getPin() {
    return [...inputs].map(i => i.value).join("");
}

// Submit
function submitPin() {
    const pin = getPin();
    const saved = JSON.parse(localStorage.getItem("login_data"))?.user_pin || "1234";

    if (pin.length < 4) {
        showError("Enter complete PIN");
        return;
    }

    if (pin !== saved) {
        showError("Incorrect PIN");
    } else {
        warningText.style.display = "none";
        //alert("✅ Login successful");
        window.location.href = "home.html";
    }
}

// Error
function showError(msg) {
    warningText.innerText = msg;
    warningText.style.display = "block";

    card.classList.add("shake");
    setTimeout(() => card.classList.remove("shake"), 250);
}

// Toggle PIN
function togglePin() {
    show = !show;
    inputs.forEach(i => i.type = show ? "text" : "password");
}

// Focus first
if (inputs.length) inputs[0].focus();
</script>

</body>
</html>
