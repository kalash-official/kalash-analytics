<!DOCTYPE html>
<html>
<head>
  <title>Kalash Analytics</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Navbar -->
<nav>
  <h2>Kalash Analytics</h2>

  <ul>
    <li>Home</li>
    <li>Services</li>
    <li>Contact</li>
  </ul>

  <button class="login-btn" onclick="checkLogin()">Login</button>
</nav>

<!-- Hero Section -->
<section class="hero">
  <h1>Smart Stock Analysis 📈</h1>
  <p>Accurate signals & data-driven trading insights</p>
  <button onclick="joinNow()">Join Now</button>
</section>

<!-- Services -->
<section class="services">
  <h2>Our Services</h2>

  <div class="card">
    <h3>Intraday Signals</h3>
    <p>High accuracy stock signals</p>
  </div>

  <div class="card">
    <h3>Swing Trading</h3>
    <p>Short term profit strategies</p>
  </div>

  <div class="card">
    <h3>Market Analysis</h3>
    <p>Daily expert analysis</p>
  </div>
</section>

<footer>
  <p>© 2026 Kalash Analytics</p>
</footer>
  
<script>
  function checkLogin() {
  let data = localStorage.getItem("login_data");
    alert(data);
  if (data) {
    let parsed = JSON.parse(data);

    if (parsed.login_status === "pin_complete") {
      // ✅ Already logged in → PIN page
      window.location.href = "pin.html";
      return;
    }
  }

  // ❌ Not logged in → Login page
  window.location.href = "login.html";
}

window.onload = function () {
  checkLogin();
};
  
</script>
<script src="js/script.js"></script>
</body>
</html>
