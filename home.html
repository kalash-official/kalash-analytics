<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Dashboard</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{display:flex;background:#f5f7fb;}

/* Sidebar */
.sidebar{
  width:260px;height:100vh;
  background:linear-gradient(180deg,#111827,#1f2937);
  color:#fff;position:fixed;
}
.sidebar h2{padding:20px;text-align:center;}
.sidebar ul{list-style:none;padding:10px;}
.sidebar ul li{padding:12px;cursor:pointer;border-radius:8px;}
.sidebar ul li:hover{background:#374151;}

/* Main */
.main{margin-left:260px;width:100%;}

/* Navbar */
.navbar{
  display:flex;justify-content:space-between;
  padding:15px;background:#fff;
}

.icon{
  position:relative;
  width:40px;height:40px;
  background:#eee;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
}

/* Badge */
.badge-count{
  position:absolute;
  top:-5px;right:-5px;
  background:#22c55e;
  color:#fff;
  width:18px;height:18px;
  display:flex;align-items:center;justify-content:center;
  border-radius:50%;
  font-size:10px;
}
</style>

</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
  <h2>Dashboard</h2>
  <ul>
    <li>Home</li>
    <li>Account</li>
  </ul>
</div>

<!-- Main -->
<div class="main">

  <div class="navbar">
    <h3>Home</h3>

    <div class="icon">
      📥
      <span class="badge-count" id="queueBadge">0</span>
    </div>
  </div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAUTZtR_9sM-EXq-AChMtYNh-XBpHXFs3E",
  authDomain: "kalash2-2bf90.firebaseapp.com",
  projectId: "kalash2-2bf90",
};

firebase.initializeApp(firebaseConfig);
</script>

<!-- ✅ HOME LOGIC -->
<script>
document.addEventListener("DOMContentLoaded", () => {

    const auth = firebase.auth();
    const db = firebase.firestore();

    const badge = document.getElementById("queueBadge");

    if (!badge) {
        console.error("Badge not found");
        return;
    }

    // Hide initially
    badge.style.display = "none";

    auth.onAuthStateChanged((user) => {

        if (user) {

            const phone = user.phoneNumber;
            let count = 0;

            console.log("User:", phone);

            db.collection("users_setting")
              .where("live_srno", ">", 0)
              .orderBy("live_srno", "asc")
              .get()
              .then((snapshot) => {

                  let found = false;

                  snapshot.forEach((doc) => {

                      const data = doc.data();
                      const number = data.number;

                      count++;

                      if (number === phone && !found) {
                          badge.style.display = "flex";
                          badge.innerText = count;
                          found = true;
                      }

                  });

                  if (!found) {
                      badge.style.display = "none";
                  }

              })
              .catch((error) => {
                  console.error("Firestore error:", error);
              });

        } else {
            console.log("User not logged in");
        }

    });

});
</script>

</body>
</html>
