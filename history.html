<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trade History</title>

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: "Inter", Arial, sans-serif;
  background: #f4f6f8;
  padding: clamp(8px, 2vw, 20px);
}

/* List */
.list {
  display: flex;
  flex-direction: column;
  gap: 16px;
  width: 100%;
}

/* Card */
.card {
  background: #ffffff;
  border-radius: 18px;
  padding: clamp(12px, 2.5vw, 18px);
  width: 100%;
  max-width: 520px;
  margin: auto;
  box-shadow: 0 6px 18px rgba(0,0,0,0.08);
}

/* Row Layout */
.row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 6px;
}

.row-center {
  justify-content: center;
}

/* Text Styles */
.company {
  font-size: clamp(14px, 2.5vw, 17px);
  font-weight: 700;
  color: #1f2937;
}

.top-right {
  font-size: clamp(10px, 2vw, 13px);
  font-weight: 600;
  padding: 4px 10px;
  border-radius: 10px;
}

.green { color: #16a34a; background: #e7f8ee; }
.red { color: #dc2626; background: #fdeaea; }
.gray { color: #6b7280; background: #f1f5f9; }

.divider {
  height: 1px;
  background: #e5e7eb;
  margin: 12px 0;
}

.muted {
  color: #6b7280;
  font-size: clamp(11px, 2vw, 12px);
}

.label {
  color: #374151;
  font-size: clamp(12px, 2vw, 13px);
  font-weight: 600;
}

.profit {
  font-size: clamp(13px, 2vw, 15px);
  font-weight: 700;
}

.date-center {
  font-size: clamp(12px, 2vw, 13px);
  color: #6b7280;
}

/* Distribution */
.dist {
  margin-top: 14px;
  font-size: 14px;
  font-weight: 700;
  text-align: center;
}

/* Profiles */
.profiles {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  margin-top: 12px;
  padding: 12px;
  background: #f9fafb;
  border-radius: 14px;
  justify-content: center;
}

.profile {
  flex: 1 1 110px;
  max-width: 150px;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
}

.avatar {
  position: relative;
}

.avatar img {
  width: clamp(40px, 10vw, 54px);
  height: clamp(40px, 10vw, 54px);
  border-radius: 50%;
  border: 2px solid #e5e7eb;
}

.badge {
  position: absolute;
  bottom: -5px;
  right: -5px;
  background: #16a34a;
  color: #fff;
  border-radius: 50%;
  padding: 2px 5px;
  font-size: 10px;
  border: 2px solid #fff;
}

.amount {
  font-size: clamp(11px, 2vw, 13px);
  font-weight: 600;
  margin-top: 6px;
}

.status {
  font-size: clamp(10px, 2vw, 11px);
  color: #6b7280;
}

/* Buttons */
.find-partner-btn {
  padding: 6px 10px;
  border-radius: 6px;
  border: none;
  background: linear-gradient(135deg, #4CAF50, #2E7D32);
  color: white;
  font-size: clamp(10px, 2vw, 11px);
  font-weight: 600;
  cursor: pointer;
}

.find-partner-btn:hover {
  transform: translateY(-1px);
}

/* WhatsApp Link */
.wa-link {
  font-size: clamp(10px, 2vw, 11px);
  color: #16a34a;
  text-decoration: none;
  word-break: break-all;
}

.hint {
  margin-top: 10px;
  text-align: center;
  color: #6b7280;
  font-size: 11px;
}

.uid {
  margin-top: 6px;
  text-align: center;
  font-size: 11px;
  color: #9ca3af;
}

/* Popup */
.popup-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.55);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}

.popup-box {
  width: 90%;
  max-width: 320px;
  background: #fff;
  border-radius: 18px;
  padding: 20px;
  text-align: center;
}

.popup-box input {
  width: 100%;
  padding: 12px;
  font-size: 18px;
  letter-spacing: 5px;
  text-align: center;
  border-radius: 10px;
  border: 1px solid #ccc;
  margin-top: 10px;
}

.submit-btn {
  width: 100%;
  margin-top: 15px;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(135deg, #22c55e, #15803d);
  color: #fff;
  font-weight: bold;
  cursor: pointer;
}

.popup-close {
  position: absolute;
  right: 15px;
  top: 10px;
  cursor: pointer;
  font-size: 18px;
}

/* Responsive Breakpoints */
@media (min-width: 768px) {
  .card {
    max-width: 600px;
  }
}

@media (min-width: 1200px) {
  .card {
    max-width: 700px;
  }
}
</style>
</head>

<body>

<div class="list" id="list"></div>

<script>
const list = document.getElementById("list");

/* Demo Data */
const trades = [
  {
    date: new Date(),
    name: "Reliance Industries",
    result: "positive",
    active_zone: 2500,
    upside_reaction_zone: 2550,
    quantity: 10,
    laynaiwalaAmount: 200,
    laynaiwalaNumber: "9876543210",
    laynaiwalaUsdid: "user123",
    laynaiwala_pay_status: "true"
  }
];

function formatDateTime(date) {
  return new Date(date).toLocaleString("en-GB", {
    day: "2-digit",
    month: "long",
    year: "numeric",
    hour: "2-digit",
    minute: "2-digit"
  });
}

function buildCard(d, id) {
  const profit = d.quantity * (d.upside_reaction_zone - d.active_zone);

  return `
    <div class="row row-center">
      <div class="date-center">${formatDateTime(d.date)}</div>
    </div>

    <div class="row">
      <div class="company">${d.name}</div>
      <div class="top-right green">${d.result}</div>
    </div>

    <div class="divider"></div>

    <div class="row">
      <div class="muted">Entry: ${d.active_zone}</div>
      <div class="muted">Exit: ${d.upside_reaction_zone}</div>
    </div>

    <div class="divider"></div>

    <div class="row">
      <div class="label">Profit</div>
      <div class="profit green">${profit}</div>
    </div>

    <div class="dist">Profit Distribution</div>

    <div class="profiles">

      <div class="profile">
        <div class="avatar">
          <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
        </div>
        <div class="amount">${(profit * 0.4).toFixed(2)}</div>
        <div class="status">SELF</div>
      </div>

      <div class="profile">
        <div class="avatar">
          <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
          ${d.laynaiwala_pay_status === "true" ? '<span class="badge">✔</span>' : ''}
        </div>
        <div class="amount">${d.laynaiwalaAmount}</div>
        <a class="wa-link" href="https://wa.me/${d.laynaiwalaNumber}" target="_blank">
          ${d.laynaiwalaNumber}
        </a>
      </div>

    </div>

    <div class="hint">Tap on number to chat directly with your partner</div>
    <div class="uid">UID: ${id}</div>
  `;
}

function loadTrades() {
  trades.forEach((trade, index) => {
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = buildCard(trade, index + 1);
    list.appendChild(card);
  });
}

loadTrades();
</script>

<!-- Verify Popup -->
<div id="verifyPopup" class="popup-overlay">
  <div class="popup-box">
    <div class="popup-close" onclick="document.getElementById('verifyPopup').style.display='none'">✕</div>
    <h3>Enter 6 Digit PIN</h3>
    <input type="text" maxlength="6" placeholder="••••••">
    <button class="submit-btn">Verify</button>
  </div>
</div>

</body>
</html>
