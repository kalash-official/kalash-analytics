async function loadTrades() {
  try {
    // 🔥 Query with ascending date order
    const q = query(
      collection(db, "users_setting", usDid, "trade_history"),
      orderBy("date", "desc")
    );

    const snap = await getDocs(q);

    if (snap.empty) {
      list.innerHTML = "<p style='text-align:center;color:#777;'>No trades found</p>";
      return;
    }

    list.innerHTML = ""; // clear old data

    snap.forEach(docSnap => {
      const d = docSnap.data();
      const his_did = docSnap.id;
      let html = "";

      // 🔀 same logic (no change)
      if (d.result === "positive") {
        html = buildCardPositive(d, his_did, usDid, selfNumber);
      } 
      else if (d.result === "negative" || d.result === "incomplete negative") {
        html = buildCardNegative(d, his_did);
      } 
      else if (d.result === "cancel") {
        html = buildCardCancel(d, his_did);
      } 
      else if (d.result === "incomplete positive") {
        html = buildCardIncompletePositive(d, his_did);
      } 
      else {
        html = buildCardDefault(d, his_did);
      }

      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = html;

      list.appendChild(card);
    });

  } catch (error) {
    console.error("Error loading trades:", error);
    list.innerHTML = "<p style='text-align:center;color:red;'>Error loading trades</p>";
  }
}

function formatDateTime(value) {
  if (!value) return "--";
  let d;
  if (typeof value === "object" && value.seconds) {
    d = new Date(value.seconds * 1000);
  }
 
  else if (!isNaN(value)) {
    d = new Date(Number(value));
  }
 
  else if (typeof value === "string") {
    // Fix "YYYY-MM-DD HH:mm:ss" → ISO
    const fixed = value.replace(" ", "T");
    d = new Date(fixed);
  }

  if (!d || isNaN(d.getTime())) return "--";
  return d.toLocaleString("en-GB", {
    day: "2-digit",
    month: "long",
    year: "numeric",
    hour: "2-digit",
    minute: "2-digit",
    second: "2-digit",
    hour12: false
  });
}

window.handleFindPartner = async function (usDid, his_did, selfNumber, btn) {
  btn.disabled = true;
  try {
    // 1️⃣ SELF TRADE REF
    const selfRef = doc(db, "users_setting", usDid, "trade_history", his_did);
    const selfSnap = await getDoc(selfRef);

    if (!selfSnap.exists()) {
      alert("Trade not found");
      return;
    }

    const selfData = selfSnap.data();

    // 2️⃣ CHECK ALREADY ALLOTTED
    if (selfData.laynaiwalaUsdid && selfData.laynaiwalaUsdid !== "null") {
      alert("Partner already allotted");
      location.reload();
      return;
    }

    // 3️⃣ FIND AVAILABLE PARTNER
    const q = query(
      collection(db, "negative_trade"),
      where("is_taken", "==", false),
      where("temp_name", "==", selfData.temp_name),
      orderBy("date", "asc"),
      limit(1)
    );

    const snap = await getDocs(q);

   if (snap.empty) {
     btn.disabled = false; // optional but important
     await updateDoc(selfRef, {
       laynaiwalaAmount: 0,
       laynaiwalaNumber: "cancell",
       laynaiwalaUsdid: "cancell",
       laynaiwalaThdid: "cancell",   // ✅ fixed quote
       laynaiwalaPartyType: "cancell",
       laynaiwala_pay_status: "cancell"
     });

     alert("No partner available");
     return;
    }

    const partnerDoc = snap.docs[0];
    const partnerRef = partnerDoc.ref;

    // 4️⃣ TRANSACTION
    await runTransaction(db, async (transaction) => {
      const freshPartner = await transaction.get(partnerRef);

      if (freshPartner.get("is_taken") === true) {
        throw "ALREADY_TAKEN";
      }

      const {
        th_did,
        us_did,
        party_type,
        number,
        div_amount
      } = freshPartner.data();

      const partnerTradeRef = doc(
        db,
        "users_setting",
        us_did,
        "trade_history",
        th_did
      );

      const partnerTradeSnap = await transaction.get(partnerTradeRef);
      if (!partnerTradeSnap.exists()) {
        throw "TRADE_NOT_FOUND";
      }

      // MARK PARTNER TAKEN
      transaction.update(partnerRef, { is_taken: true });

      // UPDATE PARTNER TRADE
      const updatePartner = {};
      if (party_type === "first") {
        updatePartner.daynaiwalaFirstAmount = div_amount;
        updatePartner.daynaiwalaFirstNumber = selfNumber;
        updatePartner.daynaiwalaFirstUsdid = usDid;
        updatePartner.daynaiwalaFirstTHdid = his_did;
      } else {
        updatePartner.daynaiwalaSecondAmount = div_amount;
        updatePartner.daynaiwalaSecondNumber = selfNumber;
        updatePartner.daynaiwalaSecondUsdid = usDid;
        updatePartner.daynaiwalaSecondTHdid = his_did;
      }

      transaction.update(partnerTradeRef, updatePartner);

      // UPDATE SELF TRADE
      transaction.update(selfRef, {
        laynaiwalaAmount: div_amount,
        laynaiwalaNumber: number,
        laynaiwalaUsdid: us_did,
        laynaiwalaThdid: th_did,
        laynaiwalaPartyType: party_type
      });

      // DELETE NEGATIVE_TRADE DOC
      transaction.delete(partnerRef);
    });

    // 5️⃣ SUCCESS
    alert("Partner allotted successfully");
    location.reload();

  } catch (e) {
    if (e === "ALREADY_TAKEN") {
      alert("Partner already taken, retrying...");
      location.reload();
    } else {
      console.error(e);
      alert("Operation failed, no data changed");
    }
  }
};


window.handleFindPartnerCancel = async function (usDid, his_did, selfNumber, btn) {
  btn.disabled = true;
  try {
    // 1️⃣ SELF TRADE REF
    const selfRef = doc(db, "users_setting", usDid, "trade_history", his_did);
    const selfSnap = await getDoc(selfRef);

    if (!selfSnap.exists()) {
      alert("Trade not found");
      return;
    }

    const selfData = selfSnap.data();

    // 2️⃣ CHECK ALREADY ALLOTTED
    if (selfData.cancellaynaiwalaUsdid && selfData.cancellaynaiwalaUsdid !== "null") {
      alert("Partner already allotted");
      location.reload();
      return;
    }

    // 3️⃣ FIND AVAILABLE PARTNER
    const q = query(
      collection(db, "cancel_trade"),
      where("is_taken", "==", false),
      where("temp_name", "==", selfData.temp_name),
      orderBy("date", "asc"),
      limit(1)
    );

    const snap = await getDocs(q);

    if (snap.empty) {
  btn.disabled = false; // 🔥 important

  await updateDoc(selfRef, {
    cancellaynaiwalaAmount: 0,
    cancellaynaiwalaNumber: "cancell",
    cancellaynaiwalaUsdid: "cancell",
    cancellaynaiwalaThdid: "cancell",
    cancellaynaiwala_pay_status: "true"
  });

  alert("No partner available");
  return;
}

    const partnerDoc = snap.docs[0];
    const partnerRef = partnerDoc.ref;

    // 4️⃣ TRANSACTION
    await runTransaction(db, async (transaction) => {
      const freshPartner = await transaction.get(partnerRef);

      if (freshPartner.get("is_taken") === true) {
        throw "ALREADY_TAKEN";
      }

      const {
        th_did,
        us_did,
        number,
        cancel_charge
      } = freshPartner.data();

      const partnerTradeRef = doc(
        db,
        "users_setting",
        us_did,
        "trade_history",
        th_did
      );

      const partnerTradeSnap = await transaction.get(partnerTradeRef);
      if (!partnerTradeSnap.exists()) {
        throw "TRADE_NOT_FOUND";
      }

      // MARK PARTNER TAKEN
      transaction.update(partnerRef, { is_taken: true });

      // UPDATE PARTNER TRADE
      const updatePartner = {};
      updatePartner.daynaiwalaNumber = selfNumber;
      updatePartner.daynaiwalaUsdid = usDid;
      updatePartner.daynaiwalaTHdid = his_did;
      transaction.update(partnerTradeRef, updatePartner);

      // UPDATE SELF TRADE
      transaction.update(selfRef, {
        cancellaynaiwalaAmount: cancel_charge,
        cancellaynaiwalaNumber: number,
        cancellaynaiwalaUsdid: us_did,
        cancellaynaiwalaThdid: th_did
      });

      // DELETE NEGATIVE_TRADE DOC
      transaction.delete(partnerRef);
    });

    // 5️⃣ SUCCESS
    alert("Partner allotted successfully");
    location.reload();

  } catch (e) {
    if (e === "ALREADY_TAKEN") {
      alert("Partner already taken, retrying...");
      location.reload();
    } else {
      console.error(e);
      alert("Operation failed, no data changed");
    }
  }
};

window.handleFindPartnerOwner = async function (usDid, his_did, selfNumber, btn, d) {
  if (btn) {
    btn.disabled = true;
    btn.innerText = "Please wait...";
    btn.style.opacity = "0.7";
  }

  try {
    // 1️⃣ SELF TRADE REF
    const selfRef = doc(db, "users_setting", usDid, "trade_history", his_did);
    const selfSnap = await getDoc(selfRef);

    if (!selfSnap.exists()) {
      alert("Trade not found");
      return;
    }

    const d = selfSnap.data();

    // 2️⃣ CHECK PARTNERS ALLOTTED OR NOT
    const laynaiwalaMissing = !d.laynaiwalaUsdid || d.laynaiwalaUsdid === "null";
    const cancelMissing = !d.cancellaynaiwalaUsdid || d.cancellaynaiwalaUsdid === "null";

    if (laynaiwalaMissing || cancelMissing) {
      alert("Maybe one or both partners are not allotted");
      return;
    }

    // 3️⃣ CHECK OWN AMOUNT
    const ownAmount = Number(d.own_amount || 0);

    if (ownAmount !== 0) {
      alert("Already allotted");
      return;
    }

    // 4️⃣ CALCULATION 
    const active_zone = Number(d.active_zone);
    const upside_reaction_zone = Number(d.upside_reaction_zone);
    const quantity = Number(d.quantity);

    const laynaiwalaAmount = Number(d.laynaiwalaAmount || 0);
    const cancellaynaiwalaAmount = Number(d.cancellaynaiwalaAmount || 0);

    const capture_point = upside_reaction_zone - active_zone;
    const total_prof = capture_point * quantity;
    const sixty_per = 0.6 * total_prof;

    const own_am = sixty_per - (laynaiwalaAmount + cancellaynaiwalaAmount);

    // round to 2 decimals (HALF_UP)
    const roundedOwnAmount = Math.round((own_am + Number.EPSILON) * 100) / 100;

    // 5️⃣ UPDATE FIRESTORE
    await updateDoc(selfRef, {
      own_amount: roundedOwnAmount
    });

    alert("Owner amount updated successfully");
    location.reload();

  } catch (e) {
    console.error(e);
    alert("Operation failed");
    //location.reload();
  }
};
