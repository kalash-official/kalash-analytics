<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trade History</title>

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: "Inter", Arial, sans-serif;
  background: #f4f6f8;
  padding: clamp(8px, 2vw, 20px);
}

/* List Container */
.list {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

/* Card */
.card {
  background: #ffffff;
  border-radius: 18px;
  padding: clamp(12px, 2.5vw, 18px);
  width: 100%;
  max-width: 520px;
  margin: auto;
  box-shadow: 0 6px 18px rgba(0,0,0,0.08);
}

/* Layout */
.row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 6px;
}

.row-center {
  justify-content: center;
}

.company {
  font-size: clamp(14px, 2.5vw, 17px);
  font-weight: 700;
  color: #1f2937;
}

.top-right {
  font-size: clamp(10px, 2vw, 13px);
  font-weight: 600;
  padding: 4px 10px;
  border-radius: 10px;
}

.green { color: #16a34a; background: #e7f8ee; }
.red { color: #dc2626; background: #fdeaea; }
.gray { color: #6b7280; background: #f1f5f9; }

.divider {
  height: 1px;
  background: #e5e7eb;
  margin: 12px 0;
}

.muted {
  color: #6b7280;
  font-size: clamp(11px, 2vw, 12px);
}

.label {
  color: #374151;
  font-size: clamp(12px, 2vw, 13px);
  font-weight: 600;
}

.profit {
  font-size: clamp(13px, 2vw, 15px);
  font-weight: 700;
}

.date-center {
  font-size: clamp(12px, 2vw, 13px);
  color: #6b7280;
}

.dist {
  margin-top: 14px;
  font-size: 14px;
  font-weight: 700;
  text-align: center;
}

/* Profiles */
.profiles {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  margin-top: 12px;
  padding: 12px;
  background: #f9fafb;
  border-radius: 14px;
  justify-content: center;
}

.profile {
  flex: 1 1 110px;
  max-width: 150px;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
}

.avatar {
  position: relative;
}

.avatar img {
  width: clamp(40px, 10vw, 54px);
  height: clamp(40px, 10vw, 54px);
  border-radius: 50%;
  border: 2px solid #e5e7eb;
}

.badge {
  position: absolute;
  bottom: -5px;
  right: -5px;
  background: #16a34a;
  color: #fff;
  border-radius: 50%;
  padding: 2px 5px;
  font-size: 10px;
  border: 2px solid #fff;
}

.amount {
  font-size: clamp(11px, 2vw, 13px);
  font-weight: 600;
  margin-top: 6px;
}

.status {
  font-size: clamp(10px, 2vw, 11px);
  color: #6b7280;
}

.find-partner-btn {
  padding: 6px 10px;
  border-radius: 6px;
  border: none;
  background: linear-gradient(135deg, #4CAF50, #2E7D32);
  color: white;
  font-size: clamp(10px, 2vw, 11px);
  font-weight: 600;
  cursor: pointer;
}

.wa-link {
  font-size: clamp(10px, 2vw, 11px);
  color: #16a34a;
  text-decoration: none;
  word-break: break-all;
}

.hint {
  margin-top: 10px;
  text-align: center;
  color: #6b7280;
  font-size: 11px;
}

.uid {
  margin-top: 6px;
  text-align: center;
  font-size: 11px;
  color: #9ca3af;
}

/* Popup */
.popup-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.55);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}

.popup-box {
  width: 90%;
  max-width: 320px;
  background: #fff;
  border-radius: 18px;
  padding: 20px;
  text-align: center;
  position: relative;
}

.popup-box input {
  width: 100%;
  padding: 12px;
  font-size: 18px;
  letter-spacing: 5px;
  text-align: center;
  border-radius: 10px;
  border: 1px solid #ccc;
  margin-top: 10px;
}

.submit-btn {
  width: 100%;
  margin-top: 15px;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(135deg, #22c55e, #15803d);
  color: #fff;
  font-weight: bold;
  cursor: pointer;
}

.popup-close {
  position: absolute;
  right: 12px;
  top: 8px;
  font-size: 18px;
  cursor: pointer;
}

/* Responsive */
@media (min-width: 768px) {
  .card { max-width: 600px; }
}

@media (min-width: 1200px) {
  .card { max-width: 700px; }
}
</style>
</head>

<body>

<div class="list" id="list"></div>

<!-- Verify Popup -->
<div id="verifyPopup" class="popup-overlay">
  <div class="popup-box">
    <div class="popup-close" onclick="closeVerifyPopup()">✕</div>
    <h3>Enter 6 Digit PIN</h3>
    <input
      type="text"
      id="verifyPin"
      maxlength="6"
      placeholder="••••••"
      inputmode="numeric"
      oninput="this.value=this.value.replace(/[^0-9]/g,'')"
    />
    <button class="submit-btn" onclick="submitVerifyPin()">Verify</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore, collection, getDocs,
  query, orderBy
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* Firebase Config */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "XXXXXXXXXXXX",
  appId: "XXXXXXXXXXXX"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const list = document.getElementById("list");

/* Local Storage Values */
const usDid = localStorage.getItem("us_did");

/* Format Date */
function formatDateTime(value) {
  if (!value) return "--";
  let d;

  if (value.seconds) {
    d = new Date(value.seconds * 1000);
  } else {
    d = new Date(value);
  }

  return d.toLocaleString("en-GB", {
    day: "2-digit",
    month: "long",
    year: "numeric",
    hour: "2-digit",
    minute: "2-digit"
  });
}

/* Build Card */
function buildCard(d, id) {
  const profit =
    d.quantity && d.active_zone && d.upside_reaction_zone
      ? d.quantity * (d.upside_reaction_zone - d.active_zone)
      : "---";

  return `
    <div class="row row-center">
      <div class="date-center">${formatDateTime(d.date)}</div>
    </div>

    <div class="row">
      <div class="company">${d.name || "Company"}</div>
      <div class="top-right green">${d.result || "---"}</div>
    </div>

    <div class="divider"></div>

    <div class="row">
      <div class="muted">Entry: ${d.active_zone || "---"}</div>
      <div class="muted">Exit: ${d.upside_reaction_zone || "---"}</div>
    </div>

    <div class="divider"></div>

    <div class="row">
      <div class="label">Profit</div>
      <div class="profit green">${profit}</div>
    </div>

    <div class="dist">Profit Distribution</div>

    <div class="profiles">
      <div class="profile">
        <div class="avatar">
          <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
        </div>
        <div class="amount">
          ${(profit !== "---" ? (profit * 0.4).toFixed(2) : "---")}
        </div>
        <div class="status">SELF</div>
      </div>
    </div>

    <div class="uid">UID: ${id}</div>
  `;
}

/* Load Trades from Firestore */
async function loadTrades() {
  if (!usDid) {
    list.innerHTML = "<p style='text-align:center;'>User not logged in</p>";
    return;
  }

  const q = query(
    collection(db, "users_setting", usDid, "trade_history"),
    orderBy("date", "desc")
  );

  const snap = await getDocs(q);

  if (snap.empty) {
    list.innerHTML = "<p style='text-align:center;'>No trades found</p>";
    return;
  }

  snap.forEach(docSnap => {
    const d = docSnap.data();
    const id = docSnap.id;

    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = buildCard(d, id);

    list.appendChild(card);
  });
}

/* Popup Functions */
window.closeVerifyPopup = function () {
  document.getElementById("verifyPopup").style.display = "none";
};

window.submitVerifyPin = function () {
  alert("Verification feature integrated successfully.");
};

loadTrades();
</script>

</body>
</html>
