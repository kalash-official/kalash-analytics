<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Trade Cards</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
/* ================= GLOBAL STYLES ================= */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: #f4f6fb;
    padding: 20px;
}

/* ================= CONTAINER ================= */
.trades-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
    max-width: 1600px;
    margin: auto;
}

/* ================= TRADE CARD ================= */
.trade-card-modern {
    background: linear-gradient(135deg, #ffffff, #f9fbff);
    border-radius: 16px;
    padding: 18px;
    box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
    transition: all 0.3s ease;
    border-left: 5px solid #2563eb;
    position: relative;
    overflow: hidden;
}

.trade-card-modern:hover {
    transform: translateY(-6px);
    box-shadow: 0 14px 28px rgba(0, 0, 0, 0.12);
}

/* Decorative Glow */
.trade-card-modern::before {
    content: "";
    position: absolute;
    top: 0;
    right: 0;
    width: 90px;
    height: 90px;
    background: radial-gradient(circle, rgba(37, 99, 235, 0.15), transparent);
}

/* ================= ROWS ================= */
.trade-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
    flex-wrap: wrap;
    gap: 6px;
    font-size: 14px;
}

.trade-middle {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(90px, 1fr));
    gap: 6px;
}

/* ================= TEXT STYLES ================= */
.trade-name {
    font-weight: 600;
    color: #111827;
    font-size: 15px;
}

.trade-active-zone {
    color: #2563eb;
    font-weight: 600;
}

.trade-weak-zone {
    color: #ef4444;
    font-weight: 500;
}

.trade-reaction-zone {
    color: #16a34a;
    font-weight: 500;
}

.trade-qty {
    font-size: 12px;
    font-weight: 600;
    color: #374151;
    background: #eef2ff;
    padding: 3px 8px;
    border-radius: 6px;
}

/* ================= DIVIDER ================= */
.trade-divider {
    height: 1px;
    background: #e5e7eb;
    margin: 10px 0;
}

/* ================= FOOTER ================= */
.trade-footer {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: #6b7280;
    background: #f3f4f6;
    padding: 6px 10px;
    border-radius: 6px;
}

/* ================= DISCLAIMER ================= */
.trade-disclaimer {
    margin-top: 10px;
    padding: 8px;
    font-size: 12px;
    text-align: center;
    color: #ffffff;
    background: linear-gradient(135deg, #4CAF50, #2e7d32);
    border-radius: 8px;
}

/* ================= RESPONSIVE ================= */
@media (max-width: 768px) {
    .trade-row {
        font-size: 13px;
    }
}

@media (max-width: 480px) {
    body {
        padding: 10px;
    }

    .trade-footer {
        flex-direction: column;
        align-items: flex-start;
        gap: 3px;
    }

    .trade-card-modern {
        padding: 14px;
    }

    .trade-name {
        font-size: 14px;
    }
}
</style>
</head>
<body>

<h2 style="text-align:center; margin-bottom:20px;">📊 Modern Trade Cards</h2>

<div class="trades-container" id="tradesContainer"></div>

<script>
/* ================= FORMAT DATE FUNCTION ================= */
function formatDateTime(date) {
    const d = new Date(date);
    return d.toLocaleString("en-IN", {
        day: "2-digit",
        month: "short",
        year: "numeric",
        hour: "2-digit",
        minute: "2-digit"
    });
}

/* ================= CREATE TRADE CARD ================= */
function createTradeCard(t, order_id, created_at) {
    return `
        <div class="trade-card-modern">

            <div class="trade-row">
                <span class="trade-active-zone">
                    Active zone: ${t.active_zone ?? "-"}
                </span>
                <span class="trade-name">
                    ${t.name || "N/A"}
                </span>
            </div>

            <div class="trade-row trade-middle">
                <span class="trade-weak-zone">
                    Weak zone: ${t.weak_zone ?? "-"}
                </span>
                <span class="trade-reaction-zone">
                    Reaction zone: ${t.upside_reaction_zone ?? "-"}
                </span>
                <span class="trade-qty">
                    Qty: ${t.quantity ?? "-"}
                </span>
            </div>

            <div class="trade-divider"></div>

            <div class="trade-footer">
                <span class="trade-order-id">Order ID: ${order_id}</span>
                <span class="trade-time">${created_at}</span>
            </div>

            <div class="trade-disclaimer">
                For educational purposes only. Not a SEBI registered advisor.
                Markets involve risk.
            </div>

        </div>
    `;
}

/* ================= SAMPLE DATA ================= */
const trades = [
    {
        name: "RELIANCE",
        active_zone: 2500,
        weak_zone: 2450,
        upside_reaction_zone: 2550,
        quantity: 10
    },
    {
        name: "TCS",
        active_zone: 3800,
        weak_zone: 3720,
        upside_reaction_zone: 3920,
        quantity: 5
    },
    {
        name: "INFOSYS",
        active_zone: 1500,
        weak_zone: 1460,
        upside_reaction_zone: 1580,
        quantity: 8
    }
];

/* ================= LOAD CARDS ================= */
const container = document.getElementById("tradesContainer");

trades.forEach((trade, index) => {
    const orderId = "ORD" + (1000 + index);
    const createdAt = formatDateTime(new Date());
    container.innerHTML += createTradeCard(trade, orderId, createdAt);
});
</script>

</body>
</html>
