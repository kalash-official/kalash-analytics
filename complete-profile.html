<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Complete Profile</title>

<style>
* { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

body {
    margin: 0;
    background: linear-gradient(135deg, #f0f4ff, #e6ecff);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
}

.card {
    width: 100%;
    max-width: 420px;
    background: #fff;
    border-radius: 20px;
    padding: 26px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

.title {
    text-align: center;
    font-size: 24px;
    font-weight: bold;
    margin-bottom: 24px;
}

.profile-img {
    width: 84px;
    height: 84px;
    border-radius: 50%;
    background: #f3f4f6;
    display: block;
    margin: 0 auto 24px;
    border: 2px solid #007bff;
    padding: 5px;
}

.input-group { margin-bottom: 16px; }

.input-group input {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: 1px solid #ddd;
}

button {
    width: 100%;
    height: 48px;
    margin-top: 20px;
    background: linear-gradient(45deg, #007bff, #0056d2);
    color: white;
    border: none;
    border-radius: 14px;
    font-size: 16px;
    font-weight: bold;
}

.warning-box {
    margin-top: 20px;
    padding: 14px;
    border-radius: 12px;
    background: #ffe5e5;
    color: #d93025;
    display: none;
}
</style>
</head>

<body>

<div class="card">

    <div class="title">Personal Information</div>

    <img src="images/kalash.jpg" class="profile-img">

    <div class="input-group">
        <input type="text" id="name" placeholder="Full Name">
    </div>

    <div class="input-group">
        <input type="email" id="email" placeholder="Email">
    </div>

    <div class="input-group">
        <input type="text" id="address" placeholder="Address">
    </div>

    <button onclick="submitForm()">Submit</button>

    <div class="warning-box" id="warningBox"></div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAUTZtR_9sM-EXq-AChMtYNh-XBpHXFs3E",
  authDomain: "kalash2-2bf90.firebaseapp.com",
  projectId: "kalash2-2bf90",
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
</script>

<script>
const nameInput = document.getElementById("name");
const emailInput = document.getElementById("email");
const addressInput = document.getElementById("address");
const warningBox = document.getElementById("warningBox");
const button = document.querySelector("button");

let currentPhone = null;

// 🔥 Get current logged-in user
auth.onAuthStateChanged(user => {
    if (user) {
        currentPhone = user.phoneNumber;

        // 🔹 Check level
        db.collection("users")
          .where("number", "==", currentPhone)
          .get()
          .then(snapshot => {
              snapshot.forEach(doc => {
                  const data = doc.data();
                  if (data.level === "2") {
                      window.location.href = "create-pin.html";
                  }
              });
          });

    } else {
        alert("Login required");
        window.location.href = "login.html";
    }
});

// 🔹 Warning
function showWarning(msg) {
    warningBox.style.display = "block";
    warningBox.innerText = msg;
}

// 🔹 Submit
function submitForm() {

    const name = nameInput.value.trim();
    const gmail = emailInput.value.trim();
    const address = addressInput.value.trim();

    button.disabled = true;

    if (!name || !gmail || !address) {
        showWarning("Field is empty");
        button.disabled = false;
        return;
    }

    if (name.length < 5) {
        showWarning("Enter full name");
        button.disabled = false;
        return;
    }

    if (address.length < 15) {
        showWarning("Enter full address");
        button.disabled = false;
        return;
    }

    // 🔥 Check gmail exists
    db.collection("users")
      .where("gmail", "==", gmail)
      .get()
      .then(snapshot => {

          if (!snapshot.empty) {
              showWarning("Gmail already registered");
              button.disabled = false;
          } else {

              // 🔥 Update current user
              db.collection("users")
                .where("number", "==", currentPhone)
                .get()
                .then(snapshot2 => {

                    snapshot2.forEach(doc => {

                        db.collection("users")
                          .doc(doc.id)
                          .update({
                              name: name,
                              gmail: gmail,
                              address: address,
                              level: "2",
                              profile_status: "completed",
                              second_level_signup_time: firebase.firestore.FieldValue.serverTimestamp()
                          })
                          .then(() => {

                              localStorage.setItem("login_data", JSON.stringify({
                                  login_status: "profile_complete"
                              }));

                              alert("✅ Profile saved successfully!");
                              window.location.href = "create-pin.html";
                          });

                    });

                });

          }

      });
}
</script>

</body>
</html>
