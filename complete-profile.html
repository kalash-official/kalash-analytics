<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Complete Profile</title>

<style>
* {
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    margin: 0;
    background: linear-gradient(135deg, #f0f4ff, #e6ecff);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
}

/* Card */
.card {
    width: 100%;
    max-width: 420px;
    background: #fff;
    border-radius: 20px;
    padding: 26px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

/* Title */
.title {
    text-align: center;
    font-size: 24px;
    font-weight: bold;
    margin-bottom: 24px;
}

/* Profile Image */
.profile-img {
    width: 84px;
    height: 84px;
    border-radius: 50%;
    background: #f3f4f6;
    display: block;
    margin: 0 auto 24px;
    object-fit: contain;
    border: 2px solid #007bff;
    padding: 5px;
}

/* Input Group */
.input-group {
    margin-bottom: 16px;
}

.input-group label {
    font-size: 13px;
    color: #555;
    margin-bottom: 5px;
    display: block;
}

.input-group input {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: 1px solid #ddd;
    font-size: 14px;
    transition: 0.2s;
}

.input-group input:focus {
    border-color: #007bff;
    outline: none;
    box-shadow: 0 0 0 3px rgba(0,123,255,0.1);
}

/* Button */
button {
    width: 100%;
    height: 48px;
    margin-top: 20px;
    background: linear-gradient(45deg, #007bff, #0056d2);
    color: white;
    border: none;
    border-radius: 14px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    box-shadow: 0 5px 15px rgba(0,123,255,0.25);
}

/* Warning box */
.warning-box {
    margin-top: 20px;
    padding: 14px;
    border-radius: 12px;
    background: #ffe5e5;
    color: #d93025;
    display: flex;
    align-items: center;
    font-size: 13px;
}

.warning-box span {
    margin-right: 8px;
}

/* Responsive */
@media (max-width: 400px) {
    .card {
        padding: 20px;
    }
}
</style>
</head>

<body>

<div class="card">

    <div class="title">Personal Information</div>

    <!-- Profile Image -->
    <img src="images/kalash.jpg" class="profile-img">

    <!-- Name -->
    <div class="input-group">
        <label>Full Name</label>
        <input type="text" id="name" placeholder="Enter your name">
    </div>

    <!-- Email -->
    <div class="input-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="Enter your email">
    </div>

    <!-- Address -->
    <div class="input-group">
        <label>Address</label>
        <input type="text" id="address" placeholder="Enter your address">
    </div>

    <!-- Button -->
    <button onclick="submitForm()">Submit</button>

    <!-- Warning -->
    <div class="warning-box" id="warningBox" style="display:none;">
        <span>⚠️</span>
        <div>Please fill all fields correctly.</div>
    </div>

</div>

<script>
function submitForm() {
    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const address = document.getElementById("address").value.trim();
    const warning = document.getElementById("warningBox");

    if (!name || !email || !address) {
        warning.style.display = "flex";
        return;
    }

    warning.style.display = "none";

    const userData = { name, email, address };
    localStorage.setItem("profile_data", JSON.stringify(userData));

    alert("✅ Profile saved successfully!");
}
</script>

</body>
</html>
